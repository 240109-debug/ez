<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Study | Минималистичный трекер</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #111827;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .hidden {
            display: none !important;
        }

        .card {
            background: #f9fafb;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #e5e7eb;
        }

        h2, h3 {
            font-weight: 600;
            margin-bottom: 16px;
            color: #111827;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #111827;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
        }

        .logout-btn {
            background: none;
            border: 1px solid #e5e7eb;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Статус */
        .status-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        .status-option {
            padding: 8px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 40px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .status-option.active {
            background: #111827;
            color: white;
            border-color: #111827;
        }
        .btn-save {
            width: 100%;
            padding: 10px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Таймер */
        .timer-box {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            margin: 20px 0;
        }
        #timerDisplay {
            font-size: 48px;
            font-weight: 600;
            font-family: monospace;
        }
        .btn-session {
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn-start { background: #111827; color: white; }
        .btn-stop { background: #fee2e2; color: #dc2626; }

        /* Чат */
        #chatBox {
            height: 200px;
            overflow-y: auto;
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #e5e7eb;
        }
        .chat-msg {
            padding: 8px 12px;
            margin-bottom: 8px;
            background: #f3f4f6;
            border-radius: 12px;
        }
        .chat-msg.my-message {
            background: #111827;
            color: white;
        }
        .chat-input-container {
            display: flex;
            gap: 10px;
        }
        #chatInput {
            flex: 1;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 40px;
            outline: none;
        }
        .btn-send {
            padding: 10px 20px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }

        /* Рейтинг и группа */
        .rank-row, .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .rank-avatar, .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
            margin-right: 8px;
        }
        .status-tag {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 20px;
            background: #e5e7eb;
        }

        /* Достижения */
        .ach-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }
        .ach-item {
            background: white;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid #e5e7eb;
            opacity: 0.5;
        }
        .ach-item.unlocked {
            opacity: 1;
            border-color: #22c55e;
            background: #f0fdf4;
        }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="authCard" class="card" style="text-align: center;">
        <div id="authContent">Загрузка...</div>
    </div>

    <div id="mainUI" style="display: none;">
        <div class="header">
            <div class="logo">EZ Study</div>
            <div class="user-area">
                <span id="userName"></span>
                <div class="avatar" id="userAvatar">A</div>
                <button id="logoutBtn" class="logout-btn">Выйти</button>
            </div>
        </div>

        <!-- Статусы -->
        <div class="card">
            <h3>Мой статус</h3>
            <div class="status-grid" id="statusPicker">
                <div class="status-option" data-status="🟢 Онлайн">🟢 Онлайн</div>
                <div class="status-option" data-status="☕ Отдых">☕ Отдых</div>
                <div class="status-option" data-status="📚 Учусь">📚 Учусь</div>
                <div class="status-option" data-status="🍜 Обед">🍜 Обед</div>
            </div>
            <button id="applyStatusBtn" class="btn-save">Сохранить статус</button>
        </div>

        <!-- Сессия и таймер -->
        <div class="card">
            <h3>Учебная сессия</h3>
            <div class="timer-box">
                <div id="timerDisplay">00:00:00</div>
                <button id="toggleSessionBtn" class="btn-session btn-start">▶ Начать учёбу</button>
            </div>
        </div>

        <!-- Монитор группы (вкладки) -->
        <div class="card">
            <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                <button id="tabParticipants" class="monitor-tab active">Участники</button>
                <button id="tabRanking" class="monitor-tab">Рейтинг</button>
                <button id="tabAchievements" class="monitor-tab">Достижения</button>
            </div>
            <div id="participantsPane">
                <div id="groupList">Загрузка...</div>
            </div>
            <div id="rankingPane" style="display: none;">
                <div id="rankList">Загрузка...</div>
            </div>
            <div id="achievementsPane" style="display: none;">
                <div id="achList" class="ach-container"></div>
            </div>
        </div>

        <!-- Чат -->
        <div class="card">
            <h3>Общий чат</h3>
            <div id="chatBox"></div>
            <div class="chat-input-container">
                <input type="text" id="chatInput" placeholder="Сообщение...">
                <button id="sendMsgBtn" class="btn-send">Отправить</button>
            </div>
        </div>
    </div>
</div>

<!-- Модалка статистики -->
<div id="statsModal" class="modal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
            <h3>Моя статистика</h3>
            <button id="closeModalBtn" style="background: none; border: none; font-size: 24px;">&times;</button>
        </div>
        <div id="statsContent"></div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://hecwmcynkuhtbdizfsdi.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_a7EABiugZ839No1nDOp-wg_O3u85AhT';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentProfile = null;
    let timerInterval = null;
    let heartbeatInterval = null;
    let selectedStatus = '🟢 Онлайн';

    // ---------- Вспомогательные функции ----------
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function formatTimeShort(minutes) {
        minutes = minutes || 0;
        if (minutes < 60) return `${minutes} мин`;
        const h = Math.floor(minutes / 60);
        const m = minutes % 60;
        return m ? `${h} ч ${m} мин` : `${h} ч`;
    }

    function formatSeconds(sec) {
        const h = Math.floor(sec / 3600).toString().padStart(2, '0');
        const m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        return `${h}:${m}:${s}`;
    }

    function isOnline(user) {
        return user?.last_seen && (new Date() - new Date(user.last_seen) < 60000);
    }

    // ---------- Достижения (локальные, как в рабочем коде) ----------
    const ACHIEVEMENTS_LIST = [
        { name: 'Первый шаг', icon: '🚀', desc: 'Завершить первую учебную сессию' },
        { name: 'Возвращение', icon: '🔄', desc: 'Завершить две учебные сессии' },
        { name: 'Стабильность', icon: '📅', desc: 'Завершить пять учебных сессий' },
        { name: 'Марафонец', icon: '🏃', desc: 'Одна сессия от 120 минут' },
        { name: 'Ранний старт', icon: '🌅', desc: 'Начать учёбу до 08:00' },
        { name: 'Активист', icon: '💬', desc: 'Отправить 10 сообщений' },
        { name: 'Душа компании', icon: '🤝', desc: 'Отправить 50 сообщений' },
        { name: 'Легенда', icon: '👑', desc: 'Накопить 1000 минут учёбы' }
    ];

    async function grantAchievement(name) {
        if (!currentUser) return;
        const { data: ach } = await supabase.from('achievements').select('id').eq('name', name).single();
        if (!ach) return;
        await supabase.from('user_achievements').upsert(
            { user_id: currentUser.id, achievement_id: ach.id },
            { onConflict: 'user_id,achievement_id', ignoreDuplicates: true }
        );
        await fetchAchievements();
    }

    async function fetchAchievements() {
        const { data: all } = await supabase.from('achievements').select('*');
        const { data: my } = currentUser ? await supabase.from('user_achievements').select('achievement_id').eq('user_id', currentUser.id) : { data: [] };
        const myIds = new Set(my?.map(m => m.achievement_id) || []);
        const list = (all && all.length) ? all : ACHIEVEMENTS_LIST;
        document.getElementById('achList').innerHTML = list.map(a => `
            <div class="ach-item ${myIds.has(a.id) ? 'unlocked' : ''}">
                <div class="ach-icon">${a.icon || '🏆'}</div>
                <div style="font-weight:600;">${escapeHtml(a.name)}</div>
                <small>${escapeHtml(a.desc || '')}</small>
            </div>
        `).join('');
    }

    // ---------- Рейтинг ----------
    async function fetchRanking() {
        const { data } = await supabase
            .from('profiles')
            .select('id, username, avatar_url, total_study_minutes, sessions_count')
            .order('total_study_minutes', { ascending: false })
            .limit(10);
        const container = document.getElementById('rankList');
        if (!data || !data.length) { container.innerHTML = '<div>Нет данных</div>'; return; }
        container.innerHTML = data.map((u, i) => {
            let medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
            return `
                <div class="rank-row">
                    <div style="width: 35px;">${medal}</div>
                    <div class="rank-avatar">${u.avatar_url ? `<img src="${u.avatar_url}" width="35" height="35" style="border-radius:50%;">` : '👤'}</div>
                    <div style="flex:1;"><b>${escapeHtml(u.username || 'Пользователь')}</b><br><small>${u.sessions_count || 0} сессий</small></div>
                    <b>${formatTimeShort(u.total_study_minutes)}</b>
                </div>
            `;
        }).join('');
    }

    // ---------- Монитор группы ----------
    async function fetchGroup() {
        const { data } = await supabase.from('profiles').select('*');
        if (!data) return;
        const container = document.getElementById('groupList');
        container.innerHTML = data.map(u => {
            const onlineNow = isOnline(u);
            return `
                <div class="user-item">
                    <div class="user-avatar">${u.avatar_url ? `<img src="${u.avatar_url}" width="35" height="35" style="border-radius:50%;">` : '👤'}</div>
                    <div style="flex:1;">
                        <div><span class="online-dot" style="${onlineNow ? 'background:#22c55e' : 'background:#9ca3af'}"></span> <strong>${escapeHtml(u.username || 'Пользователь')}</strong></div>
                        <div class="status-tag">${escapeHtml(u.status || '🟢 Онлайн')}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ---------- Чат ----------
    async function fetchMessages() {
        const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(50);
        const container = document.getElementById('chatBox');
        if (!data || !data.length) { container.innerHTML = '<div>Нет сообщений</div>'; return; }
        container.innerHTML = data.reverse().map(m => `
            <div class="chat-msg ${m.user_id === currentUser?.id ? 'my-message' : ''}">
                <b>${escapeHtml(m.username || 'Пользователь')}:</b>
                <div>${escapeHtml(m.text)}</div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !currentUser) return;
        await supabase.from('messages').insert({ user_id: currentUser.id, username: currentProfile?.username, text });
        input.value = '';
        await fetchMessages();
        const { data: p } = await supabase.from('profiles').select('messages_count').eq('id', currentUser.id).single();
        const newCount = (p?.messages_count || 0) + 1;
        await supabase.from('profiles').update({ messages_count: newCount }).eq('id', currentUser.id);
        if (newCount >= 10) await grantAchievement('Активист');
        if (newCount >= 50) await grantAchievement('Душа компании');
        await refreshProfile();
    }

    // ---------- Таймер и сессии ----------
    async function initSessionLogic() {
        const btn = document.getElementById('toggleSessionBtn');
        const timerDisp = document.getElementById('timerDisplay');
        const { data: p } = await supabase.from('profiles').select('is_studying, session_start').eq('id', currentUser.id).single();
        if (p?.is_studying && p?.session_start) {
            const start = new Date(p.session_start);
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const diff = Math.floor((new Date() - start) / 1000);
                timerDisp.innerText = formatSeconds(diff);
            }, 1000);
            btn.innerText = '⏹ Завершить';
            btn.classList.remove('btn-start');
            btn.classList.add('btn-stop');
        }
        btn.onclick = async () => {
            if (btn.classList.contains('btn-start')) {
                const now = new Date();
                await supabase.from('profiles').update({ is_studying: true, session_start: now.toISOString(), last_seen: now.toISOString() }).eq('id', currentUser.id);
                const start = now;
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    const diff = Math.floor((new Date() - start) / 1000);
                    timerDisp.innerText = formatSeconds(diff);
                }, 1000);
                btn.innerText = '⏹ Завершить';
                btn.classList.remove('btn-start');
                btn.classList.add('btn-stop');
                if (now.getHours() < 8) await grantAchievement('Ранний старт');
                await fetchGroup();
                await refreshProfile();
            } else {
                clearInterval(timerInterval);
                const { data: p2 } = await supabase.from('profiles').select('session_start, total_study_minutes, sessions_count').eq('id', currentUser.id).single();
                if (p2?.session_start) {
                    const diffMin = Math.max(0, Math.floor((new Date() - new Date(p2.session_start)) / 60000));
                    const newTotal = (p2.total_study_minutes || 0) + diffMin;
                    const newSessions = (p2.sessions_count || 0) + 1;
                    await supabase.from('profiles').update({ is_studying: false, session_start: null, total_study_minutes: newTotal, sessions_count: newSessions, last_seen: new Date().toISOString() }).eq('id', currentUser.id);
                    if (newSessions >= 1) await grantAchievement('Первый шаг');
                    if (newSessions >= 2) await grantAchievement('Возвращение');
                    if (newSessions >= 5) await grantAchievement('Стабильность');
                    if (diffMin >= 120) await grantAchievement('Марафонец');
                    if (newTotal >= 1000) await grantAchievement('Легенда');
                }
                timerDisp.innerText = '00:00:00';
                btn.innerText = '▶ Начать учёбу';
                btn.classList.remove('btn-stop');
                btn.classList.add('btn-start');
                await refreshProfile();
                await fetchGroup();
                await fetchRanking();
                await fetchAchievements();
            }
        };
    }

    // ---------- Профиль и статус ----------
    async function refreshProfile() {
        if (!currentUser) return;
        const { data: p } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        currentProfile = p;
        document.getElementById('userName').textContent = p?.username || 'Пользователь';
        document.getElementById('userAvatar').textContent = (p?.username || 'U')[0].toUpperCase();
    }

    async function updateStatus() {
        if (!currentUser) return;
        await supabase.from('profiles').update({ status: selectedStatus, last_seen: new Date().toISOString() }).eq('id', currentUser.id);
        await fetchGroup();
        await refreshProfile();
    }

    // ---------- Heartbeat ----------
    async function updateHeartbeat() {
        if (!currentUser) return;
        await supabase.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id);
        await fetchGroup();
    }

    // ---------- Статистика (модалка) ----------
    async function showStats() {
        if (!currentUser) return;
        const { count: msgCount } = await supabase.from('messages').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
        const { data: achievements } = await supabase.from('user_achievements').select('*, achievements(name)').eq('user_id', currentUser.id);
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        const total = profile?.total_study_minutes || 0;
        const hours = Math.floor(total / 60);
        const mins = total % 60;
        document.getElementById('statsContent').innerHTML = `
            <div class="stat-item"><span>Имя:</span><span>${escapeHtml(profile?.username)}</span></div>
            <div class="stat-item"><span>Email:</span><span>${escapeHtml(profile?.email)}</span></div>
            <div class="stat-item"><span>Всего учёбы:</span><span>${hours} ч ${mins} мин</span></div>
            <div class="stat-item"><span>Сообщений:</span><span>${msgCount || 0}</span></div>
            <div class="stat-item"><span>Достижений:</span><span>${achievements?.length || 0}</span></div>
        `;
        document.getElementById('statsModal').classList.add('active');
    }

    // ---------- Инициализация при авторизации ----------
    async function seedAchievements() {
        for (const a of ACHIEVEMENTS_LIST) {
            const { data: exists } = await supabase.from('achievements').select('id').eq('name', a.name).maybeSingle();
            if (!exists) await supabase.from('achievements').insert({ name: a.name, icon: a.icon, description: a.desc });
        }
    }

    async function initAuth() {
        const { data: { session } } = await supabase.auth.getSession();
        const authContainer = document.getElementById('authContent');
        if (session?.user) {
            currentUser = session.user;
            const avatarUrl = currentUser.user_metadata?.avatar_url;
            const username = currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0];
            await supabase.from('profiles').upsert({ id: currentUser.id, username, avatar_url: avatarUrl, last_seen: new Date().toISOString(), status: '🟢 Онлайн' }, { onConflict: 'id' });
            await seedAchievements();
            await refreshProfile();
            await fetchGroup();
            await fetchRanking();
            await fetchAchievements();
            await fetchMessages();
            await initSessionLogic();
            await updateHeartbeat();
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(updateHeartbeat, 30000);
            document.getElementById('authCard').style.display = 'none';
            document.getElementById('mainUI').style.display = 'block';
        } else {
            authContainer.innerHTML = `<button id="dynamicLoginBtn" style="padding:12px 24px; background:#111827; color:white; border:none; border-radius:40px; font-size:16px; cursor:pointer;">🔐 Войти через Google</button>`;
            document.getElementById('dynamicLoginBtn').onclick = () => {
                supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
            };
            document.getElementById('authCard').style.display = 'block';
            document.getElementById('mainUI').style.display = 'none';
        }
    }

    // ---------- Обработчики интерфейса ----------
    function switchTabs(tab) {
        document.getElementById('participantsPane').style.display = tab === 'participants' ? 'block' : 'none';
        document.getElementById('rankingPane').style.display = tab === 'ranking' ? 'block' : 'none';
        document.getElementById('achievementsPane').style.display = tab === 'achievements' ? 'block' : 'none';
        if (tab === 'ranking') fetchRanking();
        if (tab === 'achievements') fetchAchievements();
    }

    // Установка выбора статуса
    document.querySelectorAll('.status-option').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.status-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            selectedStatus = opt.getAttribute('data-status') || opt.innerText;
        });
    });
    document.getElementById('applyStatusBtn')?.addEventListener('click', updateStatus);
    document.getElementById('logoutBtn')?.addEventListener('click', async () => { await supabase.auth.signOut(); window.location.reload(); });
    document.getElementById('sendMsgBtn')?.addEventListener('click', sendMessage);
    document.getElementById('chatInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    document.getElementById('tabParticipants')?.addEventListener('click', () => switchTabs('participants'));
    document.getElementById('tabRanking')?.addEventListener('click', () => switchTabs('ranking'));
    document.getElementById('tabAchievements')?.addEventListener('click', () => switchTabs('achievements'));
    document.getElementById('closeModalBtn')?.addEventListener('click', () => document.getElementById('statsModal').classList.remove('active'));
    document.getElementById('statsModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('statsModal')) document.getElementById('statsModal').classList.remove('active'); });
    // Кнопка статистики (можно добавить в шапку, но для простоты добавим в меню)
    const statsBtn = document.createElement('button');
    statsBtn.textContent = '📊 Статистика';
    statsBtn.className = 'logout-btn';
    statsBtn.style.marginLeft = '8px';
    statsBtn.onclick = showStats;
    document.querySelector('.user-area').appendChild(statsBtn);

    // Запуск
    supabase.auth.onAuthStateChange(() => initAuth());
    initAuth();

    setInterval(() => {
        if (currentUser) {
            fetchGroup();
            fetchMessages();
            fetchRanking();
        }
    }, 15000);
</script>
</body>
</html>
