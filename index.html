<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Study | Минималистичный трекер</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #111827;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .hidden {
            display: none !important;
        }

        /* Логин форма */
        .login-card {
            background: #f9fafb;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            border: 1px solid #e5e7eb;
        }

        .login-card h2 {
            margin-bottom: 12px;
            font-weight: 600;
        }

        .google-btn {
            background: #111827;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Карточки */
        .card {
            background: #f9fafb;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #e5e7eb;
        }

        h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #111827;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #111827;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #111827;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
        }

        .logout-btn {
            background: none;
            border: 1px solid #e5e7eb;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Статус */
        .status-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            margin: 16px 0;
            outline: none;
            background: white;
        }

        .status-input:focus {
            border-color: #111827;
        }

        /* Прогресс-бар */
        .goal-section {
            margin: 20px 0;
        }

        .goal-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: #6b7280;
        }

        .progress-bar-bg {
            background: #e5e7eb;
            border-radius: 20px;
            height: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: #111827;
            width: 0%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.3s;
        }

        /* Таймер */
        .timer-block {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 16px;
            margin: 16px 0;
            border: 1px solid #e5e7eb;
        }

        .timer-display {
            font-size: 48px;
            font-weight: 600;
            font-family: monospace;
            color: #111827;
        }

        .timer-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 16px;
        }

        .timer-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            background: #f3f4f6;
        }

        .btn-start { background: #111827; color: white; }
        .btn-pause { background: #f3f4f6; color: #111827; }
        .btn-stop { background: #fee2e2; color: #dc2626; }

        /* Кнопки действий */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 40px;
            background: white;
            cursor: pointer;
            font-weight: 500;
        }

        /* Достижения */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .achievement-card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid #e5e7eb;
        }

        .achievement-card.earned {
            background: #f0fdf4;
            border-color: #22c55e;
        }

        .achievement-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .achievement-name {
            font-size: 12px;
            font-weight: 500;
        }

        /* Чат */
        .chat-messages {
            height: 280px;
            overflow-y: auto;
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #e5e7eb;
        }

        .message {
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #f3f4f6;
            border-radius: 12px;
            max-width: 80%;
        }

        .message-mine {
            margin-left: auto;
            background: #111827;
            color: white;
        }

        .message-sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 40px;
            outline: none;
            background: white;
        }

        .send-btn {
            padding: 12px 24px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }

        /* Рейтинг и группа */
        .rank-list, .member-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rank-item, .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .rank-number {
            font-weight: 600;
            width: 35px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .online-dot.online {
            background: #22c55e;
        }

        .member-status {
            font-size: 12px;
            color: #6b7280;
        }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        /* Уведомления */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #111827;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Page -->
    <div id="loginPage">
        <div class="login-card">
            <h2>EZ Study</h2>
            <p style="color: #6b7280; margin-top: 8px;">минималистичный трекер учёбы</p>
            <button id="googleLoginBtn" class="google-btn">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </button>
            <div style="margin: 16px 0; color: #d1d5db;">— or —</div>
            <input type="email" id="loginEmail" placeholder="Email" style="width:100%; padding:12px; border:1px solid #e5e7eb; border-radius:40px; margin-bottom:10px;">
            <input type="password" id="loginPassword" placeholder="Password" style="width:100%; padding:12px; border:1px solid #e5e7eb; border-radius:40px; margin-bottom:10px;">
            <button id="emailLoginBtn" class="google-btn" style="background:#374151;">Sign in with Email</button>
            <button id="registerBtn" class="google-btn" style="background:#059669; margin-top:10px;">Create Account</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <div class="header">
            <div class="logo">EZ Study</div>
            <div class="user-area">
                <span id="userName"></span>
                <div class="avatar" id="userAvatar">A</div>
                <button id="logoutBtn" class="logout-btn">Exit</button>
            </div>
        </div>

        <!-- Моя сессия -->
        <div class="card">
            <h3>Study Session</h3>
            <input type="text" id="statusInput" class="status-input" placeholder="What are you doing?">
            
            <div class="goal-section">
                <div class="goal-label">
                    <span>Daily goal</span>
                    <span id="goalText">0 / 60 min</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="goalFill"></div>
                </div>
            </div>

            <div class="timer-block">
                <div class="timer-display" id="timerDisplay">0 min</div>
                <div class="timer-buttons">
                    <button id="startBtn" class="timer-btn btn-start">Start</button>
                    <button id="pauseBtn" class="timer-btn btn-pause">Pause</button>
                    <button id="stopBtn" class="timer-btn btn-stop">Stop</button>
                </div>
            </div>

            <div class="action-buttons">
                <button id="statsBtn" class="action-btn">Statistics</button>
            </div>
        </div>

        <!-- Достижения -->
        <div class="card">
            <h3>Achievements</h3>
            <div id="achievementsList" class="achievements-grid">Loading...</div>
        </div>

        <!-- Чат -->
        <div class="card">
            <h3>Chat</h3>
            <div id="chatMessages" class="chat-messages">Loading...</div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Type a message...">
                <button id="sendBtn" class="send-btn">Send</button>
            </div>
        </div>

        <!-- Рейтинг -->
        <div class="card">
            <h3>Rankings</h3>
            <div id="rankingList" class="rank-list">Loading...</div>
        </div>

        <!-- Группа -->
        <div class="card">
            <h3>Group</h3>
            <div id="groupList" class="member-list">Loading...</div>
        </div>
    </div>
</div>

<!-- Stats Modal -->
<div id="statsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Statistics</h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div id="statsContent">Loading...</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://hecwmcynkuhtbdizfsdi.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_a7EABiugZ839No1nDOp-wg_O3u85AhT';
    const SITE_URL = window.location.origin + window.location.pathname;

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentUserId = null;
    let studyMinutes = 0;
    let timerInterval = null;

    function showNotification(title, message) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.innerHTML = `<strong>${title}</strong><br><small>${message}</small>`;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
    }

    function formatTime(minutes) {
        const hrs = Math.floor(minutes / 60);
        const mins = minutes % 60;
        if (hrs > 0) return `${hrs}h ${mins}m`;
        return `${mins}m`;
    }

    function updateTimerDisplay() {
        document.getElementById('timerDisplay').textContent = formatTime(studyMinutes);
    }

    async function saveTodayActivity() {
        if (!currentUserId) return;
        const today = new Date().toISOString().split('T')[0];
        
        const { data: existing } = await supabase
            .from('daily_activity')
            .select('study_minutes')
            .eq('user_id', currentUserId)
            .eq('activity_date', today)
            .maybeSingle();
        
        if (existing) {
            await supabase
                .from('daily_activity')
                .update({ study_minutes: studyMinutes })
                .eq('user_id', currentUserId)
                .eq('activity_date', today);
        } else {
            await supabase
                .from('daily_activity')
                .insert({ user_id: currentUserId, activity_date: today, study_minutes: studyMinutes });
        }
        updateGoalProgress();
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(async () => {
            studyMinutes++;
            updateTimerDisplay();
            if (studyMinutes % 5 === 0) {
                await saveTodayActivity();
                await updateProfileStats();
                await checkAchievements();
            }
        }, 60000);
    }

    function pauseTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    async function stopTimer() {
        pauseTimer();
        if (studyMinutes > 0) {
            await saveTodayActivity();
            await updateProfileStats();
        }
        studyMinutes = 0;
        updateTimerDisplay();
        await updateProfileStats();
    }

    async function updateProfileStats() {
        if (!currentUserId) return;
        
        const { data: profile } = await supabase
            .from('profiles')
            .select('total_study_minutes, xp_points')
            .eq('id', currentUserId)
            .single();
        
        const newTotal = (profile?.total_study_minutes || 0) + studyMinutes;
        const newXp = (profile?.xp_points || 0) + studyMinutes;
        
        await supabase
            .from('profiles')
            .update({ total_study_minutes: newTotal, xp_points: newXp, study_minutes_today: studyMinutes })
            .eq('id', currentUserId);
        
        await loadRanking();
        await loadGroup();
    }

    async function updateGoalProgress() {
        if (!currentUserId) return;
        const today = new Date().toISOString().split('T')[0];
        
        const { data } = await supabase
            .from('daily_activity')
            .select('daily_goal_minutes, study_minutes')
            .eq('user_id', currentUserId)
            .eq('activity_date', today)
            .maybeSingle();
        
        const goal = data?.daily_goal_minutes || 60;
        const studied = data?.study_minutes || studyMinutes;
        
        document.getElementById('goalText').textContent = `${studied} / ${goal} min`;
        const percent = Math.min((studied / goal) * 100, 100);
        document.getElementById('goalFill').style.width = `${percent}%`;
    }

    async function updateCustomStatus() {
        const input = document.getElementById('statusInput');
        const newStatus = input.value.trim();
        if (!newStatus || !currentUserId) return;
        
        await supabase
            .from('profiles')
            .update({ custom_status: newStatus, last_active: new Date().toISOString() })
            .eq('id', currentUserId);
        
        await loadGroup();
    }

    async function loadAchievements() {
        if (!currentUserId) return;
        
        const { data: allAch } = await supabase.from('achievements').select('*');
        const { data: userAch } = await supabase.from('user_achievements').select('achievement_id').eq('user_id', currentUserId);
        
        const earnedIds = new Set(userAch?.map(a => a.achievement_id) || []);
        
        const container = document.getElementById('achievementsList');
        if (container && allAch) {
            container.innerHTML = allAch.map(ach => `
                <div class="achievement-card ${earnedIds.has(ach.id) ? 'earned' : ''}">
                    <div class="achievement-icon">${ach.icon}</div>
                    <div class="achievement-name">${ach.name}</div>
                </div>
            `).join('');
        }
    }

    async function checkAchievements() {
        if (!currentUserId) return;
        
        const { data: profile } = await supabase
            .from('profiles')
            .select('total_study_minutes, messages_count')
            .eq('id', currentUserId)
            .single();
        
        if (studyMinutes >= 120) await earnAchievement(3);
        if (profile?.total_study_minutes >= 600) await earnAchievement(4);
        if (profile?.messages_count >= 20) await earnAchievement(5);
        if (profile?.messages_count >= 50) await earnAchievement(7);
        
        await loadAchievements();
        await loadRanking();
    }

    async function earnAchievement(achievementId) {
        const { error } = await supabase
            .from('user_achievements')
            .insert({ user_id: currentUserId, achievement_id: achievementId });
        if (!error || error.code === '23505') {
            showNotification('New achievement!', 'You earned a new badge');
        }
    }

    async function loadMessages() {
        const { data } = await supabase
            .from('messages')
            .select('*')
            .order('created_at', { ascending: true })
            .limit(50);
        
        const container = document.getElementById('chatMessages');
        if (!container) return;
        
        if (!data || data.length === 0) {
            container.innerHTML = '<div style="text-align:center;">No messages yet</div>';
            return;
        }
        
        container.innerHTML = data.map(msg => `
            <div class="message ${msg.user_id === currentUserId ? 'message-mine' : ''}">
                <div class="message-sender">${escapeHtml(msg.username)}</div>
                <div>${escapeHtml(msg.message)}</div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message || !currentUserId) return;
        
        const { data: profile } = await supabase.from('profiles').select('username').eq('id', currentUserId).single();
        
        await supabase.from('messages').insert({
            user_id: currentUserId,
            username: profile?.username || 'User',
            message: message
        });
        
        input.value = '';
        await loadMessages();
        
        const { count } = await supabase.from('messages').select('*', { count: 'exact', head: true }).eq('user_id', currentUserId);
        await supabase.from('profiles').update({ messages_count: count }).eq('id', currentUserId);
        await checkAchievements();
        await loadRanking();
    }

    async function loadRanking() {
        const { data } = await supabase
            .from('profiles')
            .select('id, username, level, total_study_minutes')
            .order('level', { ascending: false })
            .order('total_study_minutes', { ascending: false })
            .limit(10);
        
        const container = document.getElementById('rankingList');
        if (!container) return;
        if (!data || data.length === 0) { container.innerHTML = '<div>No data</div>'; return; }
        
        container.innerHTML = data.map((user, idx) => `
            <div class="rank-item">
                <span class="rank-number">${idx+1}.</span>
                <span><strong>${escapeHtml(user.username)}</strong> (Lvl ${user.level})</span>
                <span>${Math.floor(user.total_study_minutes / 60)}h</span>
            </div>
        `).join('');
    }

    async function loadGroup() {
        const { data } = await supabase.from('profiles').select('*').order('username');
        if (!data) return;
        
        const twoMinutesAgo = new Date(Date.now() - 2 * 60 * 1000).toISOString();
        const { data: presence } = await supabase.from('profiles').select('id').gt('last_active', twoMinutesAgo);
        const onlineIds = new Set(presence?.map(p => p.id) || []);
        
        const container = document.getElementById('groupList');
        container.innerHTML = data.map(user => `
            <div class="member-item">
                <div>
                    <span class="online-dot ${onlineIds.has(user.id) ? 'online' : ''}"></span>
                    <strong>${escapeHtml(user.username)}</strong>
                    <div class="member-status">${escapeHtml(user.custom_status || 'Just chilling')}</div>
                </div>
                <div>Lvl ${user.level}</div>
            </div>
        `).join('');
    }

    async function showStats() {
        if (!currentUserId) return;
        
        const { count: msgCount } = await supabase
            .from('messages')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', currentUserId);
        
        const { data: achievements } = await supabase
            .from('user_achievements')
            .select('*, achievements(name)')
            .eq('user_id', currentUserId);
        
        const { data: profile } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', currentUserId)
            .single();
        
        const { data: stats } = await supabase
            .from('daily_activity')
            .select('study_minutes, activity_date')
            .eq('user_id', currentUserId)
            .order('activity_date', { ascending: false })
            .limit(7);
        
        const totalSec = profile?.total_study_minutes || 0;
        const hours = Math.floor(totalSec / 60);
        const mins = totalSec % 60;
        
        let weekActivity = '';
        if (stats && stats.length > 0) {
            weekActivity = stats.map(s => `<div>${s.activity_date}: ${s.study_minutes} min</div>`).join('');
        } else {
            weekActivity = 'No data';
        }
        
        document.getElementById('statsContent').innerHTML = `
            <div class="stat-item"><span>Name:</span><span>${escapeHtml(profile?.username)}</span></div>
            <div class="stat-item"><span>Email:</span><span>${escapeHtml(profile?.email)}</span></div>
            <div class="stat-item"><span>Total study:</span><span>${hours}h ${mins}m</span></div>
            <div class="stat-item"><span>Messages:</span><span>${msgCount || 0}</span></div>
            <div class="stat-item"><span>Achievements:</span><span>${achievements?.length || 0}</span></div>
            <div class="stat-item"><span>Level:</span><span>${profile?.level || 1}</span></div>
            <div class="stat-item"><span>Weekly activity:</span><span>${weekActivity}</span></div>
        `;
        document.getElementById('statsModal').classList.add('active');
    }

    async function recordLogin() {
        if (!currentUserId) return;
        const today = new Date().toISOString().split('T')[0];
        
        const { data: existing } = await supabase.from('user_logins').select('id').eq('user_id', currentUserId).gte('login_time', today).maybeSingle();
        
        if (!existing) {
            await supabase.from('user_logins').insert({ user_id: currentUserId, login_time: new Date().toISOString() });
            const hour = new Date().getHours();
            if (hour < 8) await earnAchievement(1);
        }
    }

    async function checkFirstSession() {
        const { data } = await supabase.from('daily_activity').select('id').eq('user_id', currentUserId).limit(1);
        if (!data || data.length === 0) await earnAchievement(2);
    }

    async function updateHeartbeat() {
        if (!currentUserId) return;
        await supabase.from('profiles').update({ last_active: new Date().toISOString() }).eq('id', currentUserId);
        await loadGroup();
    }

    async function syncProfile(user) {
        const { data: existing } = await supabase.from('profiles').select('*').eq('id', user.id).maybeSingle();
        
        if (!existing) {
            await supabase.from('profiles').insert({
                id: user.id,
                email: user.email,
                username: user.user_metadata?.full_name || user.email?.split('@')[0],
                custom_status: 'Just chilling',
                level: 1,
                xp_points: 0
            });
            studyMinutes = 0;
        } else {
            studyMinutes = existing.study_minutes_today || 0;
            updateTimerDisplay();
        }
        
        document.getElementById('statusInput').value = existing?.custom_status || 'Just chilling';
        await updateGoalProgress();
    }

    function setupRealtime() {
        const channel = supabase.channel('realtime');
        channel.on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMessages());
        channel.on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => { loadGroup(); loadRanking(); });
        channel.on('postgres_changes', { event: '*', schema: 'public', table: 'user_achievements' }, () => loadAchievements());
        channel.subscribe();
    }

    async function loginGoogle() {
        await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: SITE_URL }
        });
    }

    async function loginEmail() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert('Error: ' + error.message);
        else alert('Signed in!');
    }

    async function registerEmail() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) alert('Error: ' + error.message);
        else alert('Check your email to confirm!');
    }

    async function logout() {
        pauseTimer();
        await supabase.auth.signOut();
        window.location.reload();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    async function onAuthStateChange(user) {
        if (user) {
            currentUser = user;
            currentUserId = user.id;
            await syncProfile(user);
            await recordLogin();
            await checkFirstSession();
            
            document.getElementById('userName').textContent = user.user_metadata?.full_name || user.email;
            const avatarLetter = (user.user_metadata?.full_name || user.email || 'U')[0].toUpperCase();
            document.getElementById('userAvatar').textContent = avatarLetter;
            
            await loadGroup();
            await loadMessages();
            await loadRanking();
            await loadAchievements();
            await updateGoalProgress();
            
            setInterval(updateHeartbeat, 30000);
            await updateHeartbeat();
            setupRealtime();
            
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        } else {
            currentUser = null;
            currentUserId = null;
            pauseTimer();
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }
    }

    document.getElementById('googleLoginBtn')?.addEventListener('click', loginGoogle);
    document.getElementById('emailLoginBtn')?.addEventListener('click', loginEmail);
    document.getElementById('registerBtn')?.addEventListener('click', registerEmail);
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
    document.getElementById('chatInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    document.getElementById('startBtn')?.addEventListener('click', startTimer);
    document.getElementById('pauseBtn')?.addEventListener('click', pauseTimer);
    document.getElementById('stopBtn')?.addEventListener('click', stopTimer);
    document.getElementById('statusInput')?.addEventListener('blur', updateCustomStatus);
    document.getElementById('statsBtn')?.addEventListener('click', showStats);
    document.getElementById('closeModalBtn')?.addEventListener('click', () => document.getElementById('statsModal').classList.remove('active'));
    document.getElementById('statsModal')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('statsModal')) {
            document.getElementById('statsModal').classList.remove('active');
        }
    });

    supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session?.user) onAuthStateChange(session.user);
        else if (event === 'SIGNED_OUT') onAuthStateChange(null);
    });

    supabase.auth.getSession().then(({ data: { session } }) => {
        onAuthStateChange(session?.user || null);
    });
</script>
</body>
</html>
