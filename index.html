<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Study | Учебная группа</title>
    <style>
        :root{
    --primary-color:#111111;
    --danger-color:#111111;
    --success-color:#111111;
    --warning-color:#111111;

    --bg-color:#ffffff;
    --card-bg:#ffffff;

    --text-main:#111111;
    --text-muted:#737373;

    --border:#e5e5e5;
}

*{
    box-sizing:border-box;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:#ffffff;
    color:var(--text-main);

    margin:0;
    padding:40px 20px;

    min-height:100vh;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.card{
    width:100%;
    max-width:700px;

    background:#ffffff;

    border:1px solid var(--border);

    border-radius:16px;

    padding:24px;

    margin-bottom:20px;
}

h2{
    margin:0 0 20px 0;

    padding-bottom:14px;

    border-bottom:1px solid var(--border);

    font-size:20px;
    font-weight:600;

    color:#111111;
}

.status-info-box{
    background:#fafafa;

    border:1px solid var(--border);

    border-radius:12px;

    padding:16px;

    margin-bottom:20px;
}

.profile-avatar{
    width:50px;
    height:50px;

    min-width:50px;

    border-radius:12px;

    background:#f5f5f5;

    border:1px solid var(--border);

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;

    font-weight:600;
}

.profile-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.stats-grid-container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:15px;
}

.stat-card{
    background:#fafafa;

    border:1px solid var(--border);

    border-radius:10px;

    padding:12px;

    text-align:center;
}

.stat-card b{
    display:block;

    color:#111111;

    font-size:18px;
}

.stat-card span{
    color:var(--text-muted);

    font-size:12px;
}

.timer-box{
    background:#ffffff;

    border:1px solid var(--border);

    border-radius:12px;

    padding:24px;

    text-align:center;

    margin-bottom:20px;
}

#timerDisplay{
    font-size:48px;

    font-weight:700;

    color:#111111;

    letter-spacing:-2px;
}

.btn-session,
.btn-save,
.btn-send{
    background:#111111;

    color:white;

    border:none;

    border-radius:10px;

    cursor:pointer;

    transition:0.2s;
}

.btn-session:hover,
.btn-save:hover,
.btn-send:hover{
    opacity:0.85;
}

.btn-session{
    padding:12px 20px;
}

.btn-save{
    width:100%;

    padding:14px;

    font-size:16px;

    font-weight:600;
}

.status-grid{
    display:flex;
    flex-wrap:wrap;
    gap:10px;

    margin:15px 0 25px;
}

.status-option{
    background:white;

    border:1px solid var(--border);

    border-radius:10px;

    padding:10px 16px;

    cursor:pointer;

    transition:.2s;
}

.status-option:hover{
    background:#f5f5f5;
}

.status-option.active{
    background:#111111;

    color:white;

    border-color:#111111;
}

.monitor-tabs{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;

    margin-bottom:16px;
}

.monitor-tab{
    background:white;

    border:1px solid var(--border);

    border-radius:10px;

    padding:10px;

    cursor:pointer;

    color:var(--text-muted);

    font-weight:600;
}

.monitor-tab.active{
    background:#111111;

    color:white;
}

.monitor-pane{
    display:none;
}

.monitor-pane.active{
    display:block;
}

.monitor-summary{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;

    margin-bottom:18px;
}

.monitor-summary-card{
    background:#fafafa;

    border:1px solid var(--border);

    border-radius:12px;

    padding:12px;

    text-align:center;
}

.monitor-summary-card b{
    display:block;
    font-size:20px;
}

.user-item{
    display:flex;
    align-items:center;

    padding:12px 0;

    border-bottom:1px solid var(--border);
}

.user-avatar-wrap{
    position:relative;

    width:40px;
    height:40px;

    margin-right:12px;
}

.user-avatar,
.rank-avatar{
    width:40px;
    height:40px;

    border-radius:10px;

    background:#f5f5f5;

    border:1px solid var(--border);

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;
}

.rank-avatar{
    width:35px;
    height:35px;
}

.user-avatar img,
.rank-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.online-dot{
    width:10px;
    height:10px;

    border-radius:50%;

    background:#d1d5db;

    position:absolute;

    bottom:0;
    right:0;

    border:2px solid white;
}

.online-dot.active{
    background:#22c55e;
}

.username{
    flex:1;
    font-weight:600;
}

.status-tag{
    background:#f5f5f5;

    border:1px solid var(--border);

    border-radius:20px;

    padding:4px 10px;

    font-size:12px;
}

.rank-row{
    display:flex;
    align-items:center;

    gap:12px;

    padding:10px 0;

    border-bottom:1px solid var(--border);
}

.ach-container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
}

.ach-item{
    background:#fafafa;

    border:1px solid var(--border);

    border-radius:12px;

    padding:12px;

    text-align:center;

    opacity:.5;
}

.ach-item.unlocked{
    opacity:1;

    background:white;

    border:2px solid #111111;
}

.ach-icon{
    font-size:24px;
}

#chatBox{
    height:250px;

    overflow-y:auto;

    background:#fafafa;

    border:1px solid var(--border);

    border-radius:12px;

    padding:12px;

    margin-bottom:12px;
}

.chat-msg{
    background:white;

    border:1px solid var(--border);

    border-radius:12px;

    padding:10px 12px;

    margin-bottom:8px;
}

.chat-msg.my-message{
    background:#f5f5f5;
}

.chat-msg b{
    color:#111111;
}

.chat-input-container{
    display:flex;
    gap:10px;
}

#chatInput{
    flex:1;

    padding:12px;

    border:1px solid var(--border);

    border-radius:10px;

    background:white;

    color:#111111;

    outline:none;
}

.empty-state{
    text-align:center;

    padding:20px;

    color:var(--text-muted);
}

#logoutBtn{
    width:100%;

    margin-top:10px;

    background:none;

    border:none;

    color:#111111;

    cursor:pointer;
}

.progress-achievement{
    background: #fafafa;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.progress-achievement:hover{
    background: #f0f0f0;
}

.progress-achievement.selected{
    border: 2px solid #111111;
    background: white;
}

.progress-bar-container{
    width: 100%;
    height: 8px;
    background: #e5e5e5;
    border-radius: 4px;
    margin-top: 6px;
    overflow: hidden;
}

.progress-bar-fill{
    height: 100%;
    background: #111111;
    border-radius: 4px;
    transition: width 0.5s ease;
}

.progress-text{
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
}

.custom-status-input{
    display: flex;
    gap: 8px;
    margin-top: 10px;
}

.custom-status-input input{
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    outline: none;
}

.custom-status-input input:focus{
    border-color: #111111;
}

.custom-status-display{
    background: #111111;
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    display: inline-block;
    margin-top: 6px;
}

.emoji-picker-btn{
    background: #f5f5f5;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 1.2rem;
}

.emoji-grid{
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    margin-top: 8px;
    padding: 8px;
    background: #fafafa;
    border-radius: 8px;
    border: 1px solid var(--border);
}

.emoji-item{
    padding: 6px;
    text-align: center;
    cursor: pointer;
    border-radius: 6px;
    font-size: 1.3rem;
    transition: 0.2s;
}

.emoji-item:hover{
    background: #e5e5e5;
    transform: scale(1.2);
}

@media(max-width:520px){

    .stats-grid-container{
        grid-template-columns:repeat(2,1fr);
    }

    .monitor-summary{
        grid-template-columns:1fr;
    }
}
    </style>
</head>
<body>

    <div class="card">
        <h2>📚 EZ Study</h2>
        <div class="status-info-box">
            <div id="authContent">Выполняется проверка авторизации...</div>
            <div id="profileContent" style="display:none;"></div>
        </div>

        <div id="sessionUI" style="display:none;">
            <div class="timer-box">
                <div style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 5px;">Текущая сессия:</div>
                <div id="timerDisplay">00:00:00</div>
                <button id="toggleSessionBtn" class="btn-session btn-start">▶ Начать учёбу</button>
            </div>
        </div>

        <p style="font-size: 0.9rem; font-weight: 600; color: #94a3b8; margin-bottom: 8px;">Установить статус:</p>
        <div class="status-grid" id="statusPicker">
            <div class="status-option" onclick="prepStatus(this, '🟢 Онлайн')">🟢 Онлайн</div>
            <div class="status-option" onclick="prepStatus(this, '☕ Отдых')">☕ Отдых</div>
            <div class="status-option" onclick="prepStatus(this, '📚 Учусь')">📚 Учусь</div>
            <div class="status-option" onclick="prepStatus(this, '🍜 Обед')">🍜 Обед</div>
        </div>
        <button class="btn-save" onclick="applyStatus()">Сохранить статус</button>
    </div>

    <div class="card">
        <h2>👥 Монитор группы</h2>
        <div class="monitor-tabs" id="monitorTabs">
            <button class="monitor-tab active" data-tab="participants" onclick="switchMonitorTab('participants')">Участники</button>
            <button class="monitor-tab" data-tab="ranking" onclick="switchMonitorTab('ranking')">Рейтинг</button>
            <button class="monitor-tab" data-tab="achievements" onclick="switchMonitorTab('achievements')">Достижения</button>
        </div>

        <div class="monitor-pane active" id="participantsPane">
            <div class="monitor-summary" id="monitorSummary">
                <div class="monitor-summary-card"><b>0</b><span>учатся</span></div>
                <div class="monitor-summary-card"><b>0</b><span>онлайн</span></div>
                <div class="monitor-summary-card"><b>0</b><span>офлайн</span></div>
            </div>
            <div id="groupList">Загрузка участников...</div>
        </div>

        <div class="monitor-pane" id="rankingPane">
            <div id="rankList">Загрузка рейтинга...</div>
        </div>

        <div class="monitor-pane" id="achievementsPane">
            <div class="ach-container" id="achList"></div>
        </div>
    </div>

    <div class="card" id="chatSection" style="display:none;">
        <h2>💬 Общий чат</h2>
        <div id="chatBox"></div>
        <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Напишите сообщение...">
            <button class="btn-send" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://hecwmcynkuhtbdizfsdi.supabase.co';
    const KEY = 'sb_publishable_a7EABiugZ839No1nDOp-wg_O3u85AhT';
    const supabase = createClient(URL, KEY);

    let currentUser = null;
    let currentProfile = null;
    let tempStatus = { text: '' };
    let timerInterval = null;
    let currentMonitorTab = 'participants';
    let isInitialized = false;
    let grantingAchievements = {};
    let presenceInterval = null;
    let dataRefreshInterval = null;

    const ACHIEVEMENTS_LIST = [
        { name: 'Первый шаг', icon: '🚀', desc: 'Завершить первую учебную сессию' },
        { name: 'Возвращение', icon: '🔄', desc: 'Завершить две учебные сессии' },
        { name: 'Стабильность', icon: '📅', desc: 'Завершить пять учебных сессий' },
        { name: 'Марафонец', icon: '🏃', desc: 'Одна сессия от 120 минут' },
        { name: 'Ранний старт', icon: '🌅', desc: 'Начать учёбу до 08:00' },
        { name: 'Активист', icon: '💬', desc: 'Отправить 10 сообщений' },
        { name: 'Душа компании', icon: '🤝', desc: 'Отправить 50 сообщений' },
        { name: 'Легенда', icon: '👑', desc: 'Накопить 1000 минут учёбы' }
    ];

    const EMOJI_LIST = ['📚', '💻', '🎯', '☕', '🎮', '💤', '🍕', '🏃', '🎵', '💡', '🌟', '🔥', '💪', '🧠', '📝', '🎨'];

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function formatTimeShort(minutes) {
        const total = Math.max(0, Math.floor(minutes || 0));
        if (total < 60) return `${total} мин`;
        const hours = Math.floor(total / 60);
        const mins = total % 60;
        return mins > 0 ? `${hours} ч ${mins} мин` : `${hours} ч`;
    }

    function formatSeconds(sec) {
        const h = Math.floor(sec / 3600).toString().padStart(2, '0');
        const m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        return `${h}:${m}:${s}`;
    }

    function isOnline(user) {
        if (!user || !user.last_seen) return false;
        const diffSeconds = (new Date() - new Date(user.last_seen)) / 1000;
        return diffSeconds < 90;
    }

    function cleanup() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        if (presenceInterval) { clearInterval(presenceInterval); presenceInterval = null; }
        if (dataRefreshInterval) { clearInterval(dataRefreshInterval); dataRefreshInterval = null; }
        grantingAchievements = {};
    }

    async function updatePresence() {
        if (!currentUser) return;
        try {
            await supabase.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id);
        } catch (e) {
            console.error('Presence error:', e);
        }
    }

    async function updateAchievementsCount() {
        if (!currentUser) return;
        try {
            const { count } = await supabase.from('user_achievements').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
            await supabase.from('profiles').update({ achievements_count: count || 0 }).eq('id', currentUser.id);
        } catch (e) {
            console.error('Count error:', e);
        }
    }

    async function grantAchievement(name) {
        if (!currentUser) return;
        if (grantingAchievements[name]) return;
        grantingAchievements[name] = true;

        try {
            const { data: achArray, error: achError } = await supabase.from('achievements').select('id').eq('name', name).limit(1);

            if (achError) {
                console.error('Ошибка поиска достижения:', achError);
                delete grantingAchievements[name];
                return;
            }

            const ach = achArray && achArray.length > 0 ? achArray[0] : null;

            if (!ach) {
                console.log(`Достижение "${name}" не найдено`);
                delete grantingAchievements[name];
                return;
            }

            const { error: upsertError } = await supabase.from('user_achievements').upsert(
                { user_id: currentUser.id, achievement_id: ach.id },
                { onConflict: 'user_id,achievement_id', ignoreDuplicates: true }
            );

            if (!upsertError) {
                console.log(`Достижение "${name}" выдано`);
                await updateAchievementsCount();
                await fetchAchievements();
                await refreshProfile();
            } else {
                console.error(`Ошибка выдачи "${name}":`, upsertError);
            }
        } catch (e) {
            console.error(`Grant error "${name}":`, e);
        } finally {
            delete grantingAchievements[name];
        }
    }

    async function fetchAchievementsProgress() {
        if (!currentUser) return [];
        try {
            const { data: all } = await supabase.from('achievements').select('*');
            const { data: my } = await supabase.from('user_achievements').select('achievement_id').eq('user_id', currentUser.id);
            const myIds = new Set(my?.map(m => m.achievement_id) || []);
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();

            if (!all) return [];

            return all.map(ach => {
                let progress = 0;
                const target = ach.target_value || 1;

                if (myIds.has(ach.id)) {
                    progress = target;
                } else {
                    switch (ach.progress_field) {
                        case 'sessions_count':
                            progress = Math.min(profile?.sessions_count || 0, target);
                            break;
                        case 'total_study_minutes':
                            progress = Math.min(profile?.total_study_minutes || 0, target);
                            break;
                        case 'messages_count':
                            progress = Math.min(profile?.messages_count || 0, target);
                            break;
                        case 'session_duration':
                            progress = 0;
                            break;
                        case 'early_start':
                            progress = 0;
                            break;
                        default:
                            progress = 0;
                    }
                }

                return {
                    ...ach,
                    isUnlocked: myIds.has(ach.id),
                    currentProgress: progress,
                    target: target,
                    progressPercent: Math.min(100, Math.round((progress / target) * 100))
                };
            });
        } catch (e) {
            console.error('Progress error:', e);
            return [];
        }
    }

    function showEmojiPicker() {
        const existing = document.getElementById('emojiPicker');
        if (existing) { existing.remove(); return; }

        const picker = document.createElement('div');
        picker.id = 'emojiPicker';
        picker.className = 'emoji-grid';

        EMOJI_LIST.forEach(emoji => {
            const item = document.createElement('div');
            item.className = 'emoji-item';
            item.textContent = emoji;
            item.onclick = () => {
                const input = document.getElementById('customStatusEmoji');
                if (input) input.value = emoji;
                picker.remove();
            };
            picker.appendChild(item);
        });

        const container = document.getElementById('customStatusContainer');
        if (container) container.appendChild(picker);
    }

    async function saveCustomStatus() {
        const emoji = document.getElementById('customStatusEmoji')?.value?.trim() || '';
        const text = document.getElementById('customStatusText')?.value?.trim() || '';
        if (!emoji && !text) return;

        await supabase.from('profiles').update({
            custom_status_emoji: emoji,
            custom_status: text,
            last_seen: new Date().toISOString()
        }).eq('id', currentUser.id);

        await refreshProfile();
        await fetchGroup();
    }

    function selectTrackingAchievement(achId, event) {
        event.stopPropagation();
        document.querySelectorAll('.progress-achievement').forEach(el => el.classList.remove('selected'));
        event.currentTarget.classList.add('selected');
        localStorage.setItem('trackingAchievement', achId);
    }

    async function renderProfileWithProgress() {
        if (!currentUser) return;

        const { data: p } = await supabase.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
        if (!p) return;

        currentProfile = p;
        const onlineStatus = isOnline(p) ? '● В сети' : '● Не в сети';
        const onlineColor = isOnline(p) ? '#22c55e' : '#94a3b8';

        const achievementsWithProgress = await fetchAchievementsProgress();
        const trackingId = localStorage.getItem('trackingAchievement');
        const container = document.getElementById('profileContent');
        const authContent = document.getElementById('authContent');

        if (!container) return;

        container.style.display = 'block';
        if (authContent) authContent.style.display = 'none';

        container.innerHTML = `
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
                <div class="profile-avatar">
                    ${p?.avatar_url ? `<img src="${p.avatar_url}" alt="">` : '👤'}
                </div>
                <div style="flex: 1;">
                    <div style="font-weight: bold;">${escapeHtml(p?.username || 'Пользователь')}</div>
                    <div style="font-size: 0.8rem; color: ${onlineColor};">${onlineStatus}</div>
                    ${p?.custom_status ? `<div class="custom-status-display">${p.custom_status_emoji || ''} ${escapeHtml(p.custom_status)}</div>` : ''}
                </div>
            </div>

            <div class="stats-grid-container">
                <div class="stat-card">
                    <b>${formatTimeShort(p?.total_study_minutes || 0)}</b>
                    <span>Учёба</span>
                </div>
                <div class="stat-card">
                    <b>${p?.sessions_count || 0}</b>
                    <span>Сессий</span>
                </div>
                <div class="stat-card">
                    <b>${p?.messages_count || 0}</b>
                    <span>Сообщ.</span>
                </div>
                <div class="stat-card">
                    <b>${p?.achievements_count || 0}</b>
                    <span>Ачивки</span>
                </div>
            </div>

            <div style="margin-top: 15px; font-size: 0.9rem; font-weight: 600; color: #94a3b8;">🎯 Отслеживание достижения:</div>
            <div id="trackingList" style="max-height: 200px; overflow-y: auto;">
                ${achievementsWithProgress.map(ach => {
                    const isTracking = trackingId == ach.id;
                    return `
                        <div class="progress-achievement ${isTracking ? 'selected' : ''}" onclick="selectTrackingAchievement(${ach.id}, event)" style="${ach.isUnlocked ? 'opacity: 0.7; border-color: var(--success-color);' : ''}">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span>
                                    ${ach.isUnlocked ? '✅' : ach.icon || '🎯'}
                                    <b style="font-size: 0.8rem;">${escapeHtml(ach.name)}</b>
                                </span>
                                <span style="font-size: 0.7rem; color: #94a3b8;">
                                    ${ach.isUnlocked ? 'Получено!' : `${ach.currentProgress}/${ach.target}`}
                                </span>
                            </div>
                            ${!ach.isUnlocked ? `
                                <div class="progress-bar-container">
                                    <div class="progress-bar-fill" style="width: ${ach.progressPercent}%; ${ach.progressPercent > 50 ? 'background: #4ade80;' : ''}"></div>
                                </div>
                                <div class="progress-text">
                                    <span>Прогресс</span>
                                    <span>${ach.progressPercent}%</span>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('')}
            </div>

            <div style="margin-top: 15px; font-size: 0.9rem; font-weight: 600; color: #94a3b8;">✏️ Кастомный статус:</div>
            <div id="customStatusContainer">
                <div class="custom-status-input">
                    <input type="text" id="customStatusEmoji" placeholder="😊" maxlength="2" style="width: 50px; text-align: center;" value="${escapeHtml(p?.custom_status_emoji || '')}">
                    <button class="emoji-picker-btn" onclick="showEmojiPicker()">😊</button>
                    <input type="text" id="customStatusText" placeholder="Твой статус..." value="${escapeHtml(p?.custom_status || '')}">
                    <button class="btn-save" onclick="saveCustomStatus()" style="padding: 8px 16px; font-size: 0.85rem;">💾</button>
                </div>
            </div>

            <div style="margin-top: 10px; font-size: 0.85rem;">📌 Статус: ${escapeHtml(p?.status || '🟢 Онлайн')}</div>
            <button id="logoutBtn">Выйти из системы</button>
        `;

        document.getElementById('logoutBtn').onclick = async () => {
            cleanup();
            await supabase.auth.signOut();
        };
    }

    async function refreshProfile() {
        await renderProfileWithProgress();
    }

    async function fetchAchievements() {
        try {
            const { data: all } = await supabase.from('achievements').select('*');
            const { data: my } = currentUser ? await supabase.from('user_achievements').select('achievement_id').eq('user_id', currentUser.id) : { data: [] };
            const myIds = new Set(my?.map(m => m.achievement_id) || []);

            const list = (all && all.length) ? all : ACHIEVEMENTS_LIST;
            const container = document.getElementById('achList');

            if (container) {
                container.innerHTML = list.map(a => `
                    <div class="ach-item ${myIds.has(a.id) ? 'unlocked' : ''}">
                        <div class="ach-icon">${a.icon || '🏆'}</div>
                        <div style="font-weight: 600; font-size: 0.75rem;">${escapeHtml(a.name)}</div>
                        <small style="color: #94a3b8;">${escapeHtml(a.description || a.desc || '')}</small>
                    </div>
                `).join('');
            }
        } catch (e) {
            console.error('Ошибка загрузки достижений:', e);
        }
    }

    async function fetchRanking() {
        try {
            const { data } = await supabase
                .from('profiles')
                .select('id, username, avatar_url, total_study_minutes, sessions_count')
                .order('total_study_minutes', { ascending: false })
                .limit(10);

            const container = document.getElementById('rankList');
            if (!container) return;

            if (!data || !data.length) {
                container.innerHTML = '<div class="empty-state">Нет данных для рейтинга</div>';
                return;
            }

            container.innerHTML = data.map((u, i) => {
                let medal = '';
                if (i === 0) medal = '🥇';
                else if (i === 1) medal = '🥈';
                else if (i === 2) medal = '🥉';
                else medal = `${i + 1}.`;

                return `
                    <div class="rank-row">
                        <div style="width: 35px; font-weight: bold;">${medal}</div>
                        <div class="rank-avatar">
                            ${u.avatar_url ? `<img src="${u.avatar_url}" alt="">` : '👤'}
                        </div>
                        <div style="flex: 1;">
                            <b>${escapeHtml(u.username || 'Пользователь')}</b>
                            <div style="font-size: 0.7rem; color: #94a3b8;">${u.sessions_count || 0} сессий</div>
                        </div>
                        <b style="color: var(--success-color);">${formatTimeShort(u.total_study_minutes || 0)}</b>
                    </div>
                `;
            }).join('');
        } catch (e) {
            console.error('Ошибка загрузки рейтинга:', e);
        }
    }

    async function fetchGroup() {
        try {
            const { data } = await supabase.from('profiles').select('*');
            if (!data) return;

            const studying = data.filter(u => u.is_studying).length;
            const online = data.filter(u => isOnline(u)).length;
            const offline = data.length - online;

            document.getElementById('monitorSummary').innerHTML = `
                <div class="monitor-summary-card"><b>${studying}</b><span>учатся</span></div>
                <div class="monitor-summary-card"><b>${online}</b><span>онлайн</span></div>
                <div class="monitor-summary-card"><b>${offline}</b><span>офлайн</span></div>
            `;

            document.getElementById('groupList').innerHTML = data.map(u => {
                const onlineNow = isOnline(u);
                return `
                    <div class="user-item">
                        <div class="user-avatar-wrap">
                            <div class="user-avatar">
                                ${u.avatar_url ? `<img src="${u.avatar_url}" alt="">` : '👤'}
                            </div>
                            <div class="online-dot ${onlineNow ? 'active' : ''}"></div>
                        </div>
                        <div class="username">
                            ${escapeHtml(u.username || 'Пользователь')}
                            ${u.custom_status ? `<br><small style="color: #94a3b8;">${u.custom_status_emoji || ''} ${escapeHtml(u.custom_status)}</small>` : ''}
                        </div>
                        <div><span class="status-tag">${escapeHtml(u.status || '🟢 Онлайн')}</span></div>
                    </div>
                `;
            }).join('');
        } catch (e) {
            console.error('Ошибка загрузки группы:', e);
        }
    }

    async function fetchMessages() {
        try {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50);

            const container = document.getElementById('chatBox');
            if (!container) return;

            if (error) {
                container.innerHTML = '<div class="empty-state">Ошибка загрузки сообщений</div>';
                return;
            }

            if (!data || !data.length) {
                container.innerHTML = '<div class="empty-state">Нет сообщений. Напиши первое!</div>';
                return;
            }

            container.innerHTML = data.map(m => `
                <div class="chat-msg ${m.user_id === currentUser?.id ? 'my-message' : ''}">
                    <b>${escapeHtml(m.username || 'Пользователь')}:</b>
                    <div>${escapeHtml(m.text || '')}</div>
                </div>
            `).join('');

            container.scrollTop = container.scrollHeight;
        } catch (e) {
            console.error('Ошибка загрузки сообщений:', e);
        }
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !currentUser || !currentProfile) return;

        input.disabled = true;

        try {
            const username = currentProfile?.username || currentUser?.email?.split('@')[0] || 'Пользователь';

            const { error } = await supabase.from('messages').insert({
                user_id: currentUser.id,
                username: username,
                text: text
            });

            if (error) {
                console.error('Ошибка отправки:', error);
                input.disabled = false;
                return;
            }

            input.value = '';
            await fetchMessages();

            const { data: p } = await supabase.from('profiles').select('messages_count').eq('id', currentUser.id).maybeSingle();
            const newCount = (p?.messages_count || 0) + 1;
            await supabase.from('profiles').update({ messages_count: newCount }).eq('id', currentUser.id);

            if (newCount >= 10) await grantAchievement('Активист');
            if (newCount >= 50) await grantAchievement('Душа компании');

            await refreshProfile();

        } catch (e) {
            console.error('Ошибка отправки сообщения:', e);
        } finally {
            input.disabled = false;
            input.focus();
        }
    }

    window.sendMessage = sendMessage;
    window.showEmojiPicker = showEmojiPicker;
    window.saveCustomStatus = saveCustomStatus;
    window.selectTrackingAchievement = selectTrackingAchievement;

    async function initSessionLogic() {
        const btn = document.getElementById('toggleSessionBtn');
        const timerDisp = document.getElementById('timerDisplay');

        if (!btn || !timerDisp) return;

        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        try {
            const { data: p } = await supabase.from('profiles').select('is_studying, session_start').eq('id', currentUser.id).maybeSingle();

            if (p?.is_studying && p?.session_start) {
                const startTime = new Date(p.session_start);
                timerInterval = setInterval(() => {
                    const diff = Math.floor((new Date() - startTime) / 1000);
                    timerDisp.innerText = formatSeconds(diff);
                }, 1000);
                btn.innerText = '⏹ Завершить';
                btn.classList.remove('btn-start');
                btn.classList.add('btn-stop');
            }

            btn.onclick = async () => {
                if (btn.classList.contains('btn-start')) {
                    const now = new Date();
                    await supabase.from('profiles').update({
                        is_studying: true,
                        session_start: now.toISOString(),
                        last_seen: now.toISOString()
                    }).eq('id', currentUser.id);

                    if (timerInterval) clearInterval(timerInterval);

                    const startTime = now;
                    timerInterval = setInterval(() => {
                        const diff = Math.floor((new Date() - startTime) / 1000);
                        timerDisp.innerText = formatSeconds(diff);
                    }, 1000);

                    btn.innerText = '⏹ Завершить';
                    btn.classList.remove('btn-start');
                    btn.classList.add('btn-stop');

                    if (now.getHours() < 8) await grantAchievement('Ранний старт');
                    await fetchGroup();
                    await refreshProfile();

                } else {
                    if (timerInterval) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                    }

                    const { data: p2 } = await supabase.from('profiles')
                        .select('session_start, total_study_minutes, sessions_count')
                        .eq('id', currentUser.id)
                        .maybeSingle();

                    if (p2?.session_start) {
                        const diffMin = Math.max(0, Math.floor((new Date() - new Date(p2.session_start)) / 60000));
                        const newTotal = (p2.total_study_minutes || 0) + diffMin;
                        const newSessions = (p2.sessions_count || 0) + 1;

                        await supabase.from('profiles').update({
                            is_studying: false,
                            session_start: null,
                            total_study_minutes: newTotal,
                            sessions_count: newSessions,
                            last_seen: new Date().toISOString()
                        }).eq('id', currentUser.id);

                        console.log(`Сессия завершена. Минут: ${diffMin}, Всего минут: ${newTotal}, Сессий: ${newSessions}`);

                        if (newSessions >= 1) await grantAchievement('Первый шаг');
                        if (newSessions >= 2) await grantAchievement('Возвращение');
                        if (newSessions >= 5) await grantAchievement('Стабильность');
                        if (diffMin >= 120) await grantAchievement('Марафонец');
                        if (newTotal >= 1000) await grantAchievement('Легенда');
                    }

                    timerDisp.innerText = '00:00:00';
                    btn.innerText = '▶ Начать учёбу';
                    btn.classList.remove('btn-stop');
                    btn.classList.add('btn-start');

                    await refreshProfile();
                    await fetchGroup();
                    await fetchRanking();
                    await fetchAchievements();
                }
            };
        } catch (e) {
            console.error('Ошибка инициализации сессии:', e);
        }
    }

    window.prepStatus = (element, text) => {
        document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active'));
        element.classList.add('active');
        tempStatus.text = text;
    };

    window.applyStatus = async () => {
        if (!currentUser || !tempStatus.text) return;

        try {
            await supabase.from('profiles').update({
                status: tempStatus.text,
                last_seen: new Date().toISOString()
            }).eq('id', currentUser.id);

            await fetchGroup();
            await refreshProfile();
        } catch (e) {
            console.error('Ошибка применения статуса:', e);
        }
    };

    window.switchMonitorTab = (tab) => {
        currentMonitorTab = tab;

        document.querySelectorAll('.monitor-tab').forEach(btn => btn.classList.remove('active'));
        const tabBtn = document.querySelector(`.monitor-tab[data-tab="${tab}"]`);
        if (tabBtn) tabBtn.classList.add('active');

        document.querySelectorAll('.monitor-pane').forEach(pane => pane.classList.remove('active'));
        const pane = document.getElementById(`${tab}Pane`);
        if (pane) pane.classList.add('active');

        if (tab === 'ranking') fetchRanking();
        if (tab === 'achievements') fetchAchievements();
    };

    async function handleUser(user) {
        if (isInitialized) return;
        isInitialized = true;

        currentUser = user;

        const avatarUrl = user.user_metadata?.avatar_url || user.user_metadata?.picture || null;
        const username = user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0] || 'Пользователь';

        try {
            await supabase.from('profiles').upsert({
                id: user.id,
                username: username,
                avatar_url: avatarUrl,
                last_seen: new Date().toISOString(),
                status: '🟢 Онлайн'
            }, { onConflict: 'id' });

            document.getElementById('sessionUI').style.display = 'block';
            document.getElementById('chatSection').style.display = 'block';

            const authContent = document.getElementById('authContent');
            if (authContent) authContent.innerHTML = '';

            await Promise.all([
                refreshProfile(),
                fetchGroup(),
                fetchRanking(),
                fetchAchievements(),
                fetchMessages()
            ]);

            await initSessionLogic();

            if (presenceInterval) clearInterval(presenceInterval);
            presenceInterval = setInterval(updatePresence, 30000);

            if (dataRefreshInterval) clearInterval(dataRefreshInterval);
            dataRefreshInterval = setInterval(() => {
                fetchGroup();
                if (currentUser) {
                    fetchMessages();
                    fetchRanking();
                }
            }, 10000);

            console.log('Пользователь полностью загружен');
        } catch (e) {
            console.error('Ошибка в handleUser:', e);
        }
    }

    function showLoginButton() {
        const container = document.getElementById('authContent');
        if (!container) return;

        const profileContent = document.getElementById('profileContent');
        if (profileContent) profileContent.style.display = 'none';

        container.style.display = 'block';
        container.innerHTML = `
            <button id="loginBtn" style="width:100%; padding:14px; border-radius:10px; background:white; color:#1e293b; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;">
                <img src="https://www.google.com/favicon.ico" width="18"> Войти через Google
            </button>
        `;

        const loginBtn = document.getElementById('loginBtn');
        if (loginBtn) {
            loginBtn.onclick = async () => {
                await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: 'https://240109-debug.github.io/ez/'
                    }
                });
            };
        }
    }

    async function initAuth() {
        console.log('Проверка авторизации...');

        try {
            const { data: { session }, error } = await supabase.auth.getSession();

            if (error) {
                console.error('Ошибка получения сессии:', error);
                showLoginButton();
                return;
            }

            if (session?.user && !isInitialized) {
                console.log('Сессия найдена:', session.user.email);
                await handleUser(session.user);
            } else if (!session?.user) {
                showLoginButton();
            }

        } catch (e) {
            console.error('Критическая ошибка в initAuth:', e);
            showLoginButton();
        }
    }

    supabase.auth.onAuthStateChange((event, session) => {
        console.log('Событие авторизации:', event);

        if (event === 'SIGNED_IN' && session?.user && !isInitialized) {
            handleUser(session.user);
        }

        if (event === 'SIGNED_OUT') {
            currentUser = null;
            currentProfile = null;
            isInitialized = false;
            cleanup();
            showLoginButton();
            document.getElementById('sessionUI').style.display = 'none';
            document.getElementById('chatSection').style.display = 'none';
        }
    });

    window.addEventListener('load', async () => {
        console.log('Страница загружена');
        setTimeout(async () => {
            await initAuth();
        }, 300);
    });
</script>
</body>
</html>
